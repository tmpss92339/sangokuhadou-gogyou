<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三霸五行最節約計算</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background: #fafffa;
      margin: 0;
      padding: 6px;
      color: #222;
      font-size: 10px;
    }

    .container {
      max-width: 460px;
      margin: 0 auto;
      background: #fff;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    h1 {
      margin-top: 0;
      font-size: 14px;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .field {
      margin-bottom: 8px;
    }

    label.title {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
      font-size: 11px;
      line-height: 1.2;
    }

    select {
      width: 100%;
      max-width: 120px;
      padding: 3px 6px;
      font-size: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      line-height: 1.2;
    }

    .question {
      padding: 6px;
      border: 1px solid #ccffcc;
      border-radius: 6px;
      margin-bottom: 6px;
      background: #fafffa;
    }

    .question-title {
      font-weight: bold;
      margin-bottom: 4px;
      font-size: 10px;
      line-height: 1.2;
    }

    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      background: #fff;
      border: 1px solid #ccffcc;
      padding: 2px 5px;
      border-radius: 999px;
      font-size: 10px;
      line-height: 1.1;
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 4px;
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      table-layout: fixed;
    }

    .result-table td {
      border: 1px solid #ccffcc;
      padding: 4px 3px;
      text-align: center;
      font-size: 9px;
      line-height: 1.1;
      word-break: break-word;
    }

    .result-table .col-1 {
      width: 3.6em;
    }

    .result-table .col-2 {
      width: 2.4em;
    }

    .result-table .col-3 {
      width: auto;
    }
  
    button {
      padding: 4px 8px;
      font-size: 10px;
      border: 1px solid #ccffcc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }

    button:hover {
      background: #f1f5f9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>三霸五行最節約計算  by圖書館</h1>

    <div class="field">
      <label class="title" for="targetLevel">目標合計等級</label>
      <select id="targetLevel" name="targetLevel">
        <option value="">請選擇</option>
        <option value="30">30</option>
        <option value="35">35</option>
        <option value="40">40</option>
      </select>
    </div>

    <div class="field">
      <label class="title">武將適性</label>

      <div class="question">
        <div class="question-title">主將</div>
        <div class="options">
          <label><input type="radio" name="q1" value="S"> S</label>
          <label><input type="radio" name="q1" value="A"> A</label>
          <label><input type="radio" name="q1" value="B"> B</label>
          <label><input type="radio" name="q1" value="C"> C</label>
          <label><input type="radio" name="q1" value="D"> D</label>
        </div>
      </div>

      <div class="question">
        <div class="question-title">副將1</div>
        <div class="options">
          <label><input type="radio" name="q2" value="S"> S</label>
          <label><input type="radio" name="q2" value="A"> A</label>
          <label><input type="radio" name="q2" value="B"> B</label>
          <label><input type="radio" name="q2" value="C"> C</label>
          <label><input type="radio" name="q2" value="D"> D</label>
        </div>
      </div>

      <div class="question">
        <div class="question-title">副將2</div>
        <div class="options">
          <label><input type="radio" name="q3" value="S"> S</label>
          <label><input type="radio" name="q3" value="A"> A</label>
          <label><input type="radio" name="q3" value="B"> B</label>
          <label><input type="radio" name="q3" value="C"> C</label>
          <label><input type="radio" name="q3" value="D"> D</label>
        </div>
      </div>

      <div class="question">
        <div class="question-title">輔佐1</div>
        <div class="options">
          <label><input type="radio" name="q4" value="S"> S</label>
          <label><input type="radio" name="q4" value="A"> A</label>
          <label><input type="radio" name="q4" value="B"> B</label>
          <label><input type="radio" name="q4" value="C"> C</label>
          <label><input type="radio" name="q4" value="D"> D</label>
        </div>
      </div>

      <div class="question">
        <div class="question-title">輔佐2</div>
        <div class="options">
          <label><input type="radio" name="q5" value="S"> S</label>
          <label><input type="radio" name="q5" value="A"> A</label>
          <label><input type="radio" name="q5" value="B"> B</label>
          <label><input type="radio" name="q5" value="C"> C</label>
          <label><input type="radio" name="q5" value="D"> D</label>
        </div>
      </div>
    </div>
      <div class="field">
      <label class="title">最划算等級試算</label>
      <table class="result-table">
        <colgroup>
          <col class="col-1">
          <col class="col-2">
          <col class="col-3">
        </colgroup>
        <tbody>
          <tr>
            <td>主將</td>
            <td id="r1c2"></td>
            <td id="r1c3"></td>
          </tr>
          <tr>
            <td>副將1</td>
            <td id="r2c2"></td>
            <td id="r2c3"></td>
          </tr>
          <tr>
            <td>副將2</td>
            <td id="r3c2"></td>
            <td id="r3c3"></td>
          </tr>
          <tr>
            <td>輔佐1</td>
            <td id="r4c2"></td>
            <td id="r4c3"></td>
          </tr>
          <tr>
            <td>輔佐2</td>
            <td id="r5c2"></td>
            <td id="r5c3"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const baseValues = [
      3000,
      15000,
      60000,
      180000,
      360000,
      540000,
      586000,
      612000,
      653000,
      784000,
      941000,
      1130000,
      1469000,
      1910000,
      2674000
    ];

    const answerToN = {
      S: 5,
      A: 4,
      B: 3,
      C: 2,
      D: 1
    };

    function getAnswerValue(questionName) {
      return document.querySelector(`input[name="${questionName}"]:checked`)?.value || null;
    }

    function clearResults() {
      for (let i = 1; i <= 5; i++) {
        document.getElementById(`r${i}c2`).textContent = "";
        document.getElementById(`r${i}c3`).textContent = "";
      }
    }

    function calculateVariables() {
      const targetLevel = Number(document.getElementById("targetLevel").value);
      const answers = [
        getAnswerValue("q1"),
        getAnswerValue("q2"),
        getAnswerValue("q3"),
        getAnswerValue("q4"),
        getAnswerValue("q5")
      ];

      if (!targetLevel || answers.includes(null)) {
        clearResults();
        return;
      }

      const blocks = answers.map((answer) => {
        const n = answerToN[answer];
        return baseValues.map(value => value / n);
      });

      const variables = blocks.flat();
      const sortedVariables = [...variables].sort((a, b) => a - b);
      const p = sortedVariables[targetLevel - 1];

      const counts = [];

      blocks.forEach((block, index) => {
        const count = block.filter(value => value <= p).length;
        counts.push(count);
        document.getElementById(`r${index + 1}c2`).textContent = count;
      });

      const q = counts.reduce((sum, value) => sum + value, 0) - targetLevel;
      const r = variables.filter(value => value === p).length;

      if (q === 0) {
        counts.forEach((_, index) => {
          document.getElementById(`r${index + 1}c3`).textContent = "";
        });
      } else {
        counts.forEach((count, index) => {
          const hasEqualP = blocks[index].some(value => value === p);
          document.getElementById(`r${index + 1}c3`).textContent = hasEqualP
            ? `此${r}名武將中，可擇${q}名，將五行升至LV${count - 1}即可`
            : "";
        });
      }

      console.log("75個變數：", variables);
      console.log("排序後：", sortedVariables);
      console.log("P：", p);
      console.log("Q：", q);
      console.log("R：", r);
    }

    function bindAutoCalculate() {
      document.getElementById("targetLevel").addEventListener("change", calculateVariables);
      document.querySelectorAll('input[type="radio"]').forEach((radio) => {
        radio.addEventListener("change", calculateVariables);
      });
    }

    bindAutoCalculate();
  </script>
</body>
</html>
